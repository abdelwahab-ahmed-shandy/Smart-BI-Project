<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart BI System</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css\style.css">
</head>
<body>

    <header>
        <div class="logo-text">Smart BI System</div>
        <div class="mci-logo">MCI</div>
    </header>

    <div class="container">
        <div class="hero-section">
            <h1>حلل بيانات مبيعاتك <span>بلمسة ذكية</span></h1>
            <p>ارفع ملف الـ Excel واترك الباقي لمحرك الأتمتة والذكاء الاصطناعي</p>
        </div>

        <div class="analysis-card">
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" placeholder="example@mail.com" id="emailInput">
            </div>

            <div class="drop-zone" id="dropZone">
                <div class="cloud-icon">☁</div>
                <p>اسحب وأفلت ملف الـ Excel هنا</p>
                <span>أو اضغط لاختيار الملف من جهازك</span>
                <input type="file" id="fileInput" hidden accept=".xlsx, .xls">
            </div>

            <button class="btn-analyze" id="submitBtn">بدء التحليل الذكي</button>
        </div>
    </div>

    <script src="js\script.js"></script>
    
</body>
</html>
