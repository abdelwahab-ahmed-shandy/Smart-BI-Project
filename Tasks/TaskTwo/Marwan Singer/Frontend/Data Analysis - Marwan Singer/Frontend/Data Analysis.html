<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصفوفة تحليل البيانات الذكية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: #020617;
            background-image: radial-gradient(circle at 2px 2px, rgba(56, 189, 248, 0.05) 1px, transparent 0);
            background-size: 32px 32px;
            color: #f1f5f9;
        }
        .glow-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(30, 64, 175, 0.15), transparent 70%);
            pointer-events: none; z-index: -1;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 1.25rem;
        }
        .accent-gradient {
            background: linear-gradient(135deg, #48f37e 0%, #17db41 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(135deg, #02c747 0%, #46e55e 100%);
            transition: all 0.3s ease;
        }
        .upload-zone {
            border: 2px dashed rgba(56, 189, 248, 0.3);
            background: rgba(56, 189, 248, 0.02);
            cursor: pointer;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(56, 189, 248, 0.1); color: #38bdf8; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
        td { padding: 10px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">
    <div class="glow-bg"></div>

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 text-center md:text-right">
            <h1 class="text-4xl font-bold tracking-tight">مصفوفة <span class="accent-gradient">تحليل البيانات</span></h1>
            <p class="text-slate-400 mt-2 font-light">نظام الربط والمعالجة العصبية</p>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-card p-6 border-l-2 border-l-blue-500 text-center">
                        <p class="text-slate-500 text-[10px] font-bold uppercase">الصفوف</p>
                        <h2 id="rowCount" class="text-3xl font-mono text-blue-400">0</h2>
                    </div>
                    <div class="glass-card p-6 border-l-2 border-l-purple-500 text-center">
                        <p class="text-slate-500 text-[10px] font-bold uppercase">الأعمدة</p>
                        <h2 id="colCount" class="text-3xl font-mono text-purple-400">0</h2>
                    </div>
                    <div class="glass-card p-6 border-l-2 border-l-emerald-500 text-center">
                        <p class="text-slate-500 text-[10px] font-bold uppercase">الربط</p>
                        <h2 id="syncStatus" class="text-xl font-mono text-slate-500 italic font-bold uppercase tracking-widest">Idle</h2>
                    </div>
                </div>

                <div class="glass-card p-8">
                    <div class="h-[350px] w-full"><canvas id="dataChart"></canvas></div>
                </div>

                <div id="tableContainer" class="glass-card p-6 hidden">
                    <div class="overflow-x-auto max-h-[300px]">
                        <table id="excelTable">
                            <thead id="tableHeader"></thead>
                            <tbody id="tableBody" class="text-slate-400 text-xs"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="glass-card p-8 sticky top-10 border-t-2 border-t-blue-500/30">
                    <form id="mainForm" class="space-y-6">
                        <div>
                            <label class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">البريد الإلكتروني للتقرير</label>
                            <input type="email" id="userEmail" required placeholder="example@system.com" 
                                class="w-full bg-slate-900/50 border border-slate-800 rounded-xl px-4 py-3 mt-1 text-sm outline-none focus:border-blue-500 transition-all font-mono">
                        </div>

                        <div id="dropZone" class="upload-zone rounded-2xl p-10 text-center transition-all group">
                            <input type="file" id="fileIn" class="hidden" accept=".xlsx, .xls, .csv">
                            <i class="fas fa-fingerprint text-4xl mb-4 text-slate-700 group-hover:text-blue-500 transition-colors"></i>
                            <p id="fileName" class="text-xs text-slate-500 font-mono italic">ارفع المصدر الرقمي (Excel)</p>
                        </div>

                        <button type="submit" id="submitBtn" class="btn-primary w-full text-white font-bold py-4 rounded-xl shadow-xl flex items-center justify-center gap-3">
                            <span>تنفيذ</span>
                            <i class="fas fa-bolt"></i>
                        </button>
                    </form>

                    <div id="statusArea" class="hidden mt-8 space-y-3">
                        <div class="flex justify-between font-mono text-[10px]">
                            <span id="loaderText" class="text-blue-400">Analysing Bytes...</span>
                            <span id="percent" class="text-slate-400">0%</span>
                        </div>
                        <div class="w-full bg-slate-900 h-1 rounded-full overflow-hidden">
                            <div id="pBar" class="bg-blue-500 h-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;
        const WEBHOOK_URL = 'http://localhost:5678/webhook-test/2f39d4ac-85da-49ef-8d96-614368b80ba5';

        const fileIn = document.getElementById('fileIn');
        const dropZone = document.getElementById('dropZone');
        const mainForm = document.getElementById('mainForm');

        dropZone.onclick = () => fileIn.click();
        fileIn.onchange = (e) => {
            if(e.target.files[0]) {
                document.getElementById('fileName').innerText = `FILE: ${e.target.files[0].name}`;
                document.getElementById('fileName').classList.add('text-blue-400');
            }
        };

        mainForm.onsubmit = async (e) => {
            e.preventDefault();
            const file = fileIn.files[0];
            const email = document.getElementById('userEmail').value;

            if (!file) { alert('يرجى اختيار ملف'); return; }

            // 1. بدء المعالجة المحلية (عرض البيانات)
            document.getElementById('statusArea').classList.remove('hidden');
            updateProgress(30, 'Reading Excel...');

            const reader = new FileReader();
            reader.onload = async (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                
                renderLocalData(jsonData);
                updateProgress(60, 'Sending');

                // 2. إرسال البيانات إلى n8n
                const formData = new FormData();
                formData.append('email', email);
                formData.append('file', file);

                try {
                    const response = await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
                    if (response.ok) {
                        updateProgress(100, 'Success!');
                        document.getElementById('syncStatus').innerText = "Synced";
                        document.getElementById('syncStatus').className = "text-xl font-mono text-emerald-500 italic font-bold";
                        alert('تم التحليل بنجاح وإرسال البيانات');
                    } else { throw new Error(); }
                } catch (err) {
                    updateProgress(100, 'Error');
                    document.getElementById('syncStatus').innerText = "Failed";
                    document.getElementById('syncStatus').classList.add('text-red-500');
                    alert('خطأ في الاتصال');
                }
            };
            reader.readAsArrayBuffer(file);
        };

        function updateProgress(val, text) {
            document.getElementById('pBar').style.width = val + '%';
            document.getElementById('percent').innerText = val + '%';
            document.getElementById('loaderText').innerText = text;
        }

        function renderLocalData(data) {
            if(!data.length) return;
            document.getElementById('rowCount').innerText = data.length;
            const keys = Object.keys(data[0]);
            document.getElementById('colCount').innerText = keys.length;

            document.getElementById('tableContainer').classList.remove('hidden');
            document.getElementById('tableHeader').innerHTML = `<tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr>`;
            document.getElementById('tableBody').innerHTML = data.slice(0, 5).map(row => 
                `<tr>${keys.map(k => `<td>${row[k] || ''}</td>`).join('')}</tr>`
            ).join('');

            updateChart(data, keys);
        }

        function updateChart(data, keys) {
            const labels = data.slice(0, 10).map(item => item[keys[0]] || 'N/A');
            const values = data.slice(0, 10).map(item => typeof item[keys[1]] === 'number' ? item[keys[1]] : 0);

            if(chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('dataChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: keys[1],
                        data: values,
                        backgroundColor: '#38bdf8',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        x: { ticks: { color: '#64748b' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
