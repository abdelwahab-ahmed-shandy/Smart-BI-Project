<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول النظام | Smart BI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="Assets/css/style.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1055/1055644.png" type="image/png">
</head>
<body class="auth-page">

<!-- زر تبديل الوضع -->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 1000;">
    <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle dark mode">
        <i class="bi bi-moon-stars-fill"></i>
    </button>
</div>

<div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="auth-logo-wrapper">
                <img src="Assets/img/e6ecb39d-3feb-4943-bced-b1204095b566.jpeg" alt="MCI Logo" height="70">
            </div>
            <h3 class="fw-bold mt-3 auth-title" id="authTitle">تسجيل الدخول</h3>
            <p class="text-muted small" id="authSubtitle">مرحباً بك في نظام Smart BI</p>
        </div>

        <form id="authForm">
            <div class="mb-3 text-start">
                <label class="form-label fw-semibold small">
                    <i class="bi bi-envelope-fill text-primary me-1"></i>
                    البريد الإلكتروني
                </label>
                <input type="email" id="authEmail" class="form-control form-control-lg" required placeholder="name@example.com">
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-semibold small">
                    <i class="bi bi-lock-fill text-primary me-1"></i>
                    كلمة المرور
                </label>
                <input type="password" id="authPassword" class="form-control form-control-lg" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="authBtn">
                <span id="btnText">دخول</span>
                <div class="spinner-border spinner-border-sm ms-2" id="loadingSpinner" style="display: none;" role="status"></div>
            </button>
        </form>

        <div class="text-center">
            <a href="#" id="toggleAuth" class="text-decoration-none toggle-auth-link">
                <i class="bi bi-person-plus-fill me-1"></i>
                <span>ليس لديك حساب؟ إنشاء حساب جديد</span>
            </a>
        </div>
        
        <!-- مستخدم تجريبي -->
        <div class="mt-4 pt-3 text-center border-top">
            <p class="text-muted small mb-2">👨‍💻 حساب تجريبي للاختبار:</p>
            <div class="d-flex justify-content-center gap-3">
                <button type="button" class="btn btn-outline-primary btn-sm" id="demoUserBtn">
                    <i class="bi bi-person-circle me-1"></i>demo@smartbi.com / 123456
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. نظام الـ Dark Mode (شغال زي ما هو)
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle?.querySelector('i');
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    if (themeToggle) {
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            if (themeIcon) {
                themeIcon.className = newTheme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
            }
        });
    }

    // 2. إعدادات التبديل بين (دخول / تسجيل)
    const authForm = document.getElementById('authForm');
    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');
    const authBtn = document.getElementById('authBtn');
    const btnText = document.getElementById('btnText');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const toggleAuth = document.getElementById('toggleAuth');
    let isLoginMode = true; // الحالة الافتراضية: دخول

    // وظيفة زرار التبديل (مهمة جداً لفتح إنشاء حساب)
    toggleAuth.onclick = (e) => {
        e.preventDefault();
        isLoginMode = !isLoginMode; // اقلب الحالة
        
        if (isLoginMode) {
            authTitle.innerText = "تسجيل الدخول";
            authSubtitle.innerText = "مرحباً بعودتك! سجل دخولك للمتابعة";
            btnText.innerText = "دخول";
            toggleAuth.innerHTML = '<i class="bi bi-person-plus-fill me-1"></i><span>ليس لديك حساب؟ إنشاء حساب جديد</span>';
        } else {
            authTitle.innerText = "إنشاء حساب جديد";
            authSubtitle.innerText = "انضم إلينا وابدأ تحليل بياناتك";
            btnText.innerText = "تسجيل";
            toggleAuth.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i><span>لديك حساب بالفعل؟ سجل دخولك</span>';
        }
    };

    // 3. الربط الفعلي مع سيرفر بايثون (Flask)
authForm.onsubmit = async (e) => {
    e.preventDefault();
    
    // 1. جلب البيانات وتجهيز الواجهة
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const submitBtn = document.getElementById('authBtn');
    const btnText = document.getElementById('btnText');
    const loadingSpinner = document.getElementById('loadingSpinner');

    submitBtn.disabled = true;
    loadingSpinner.style.display = 'inline-block';
    btnText.innerText = "جاري الدخول...";

    const endpoint = isLoginMode ? '/login' : '/register';

    try {
        const response = await fetch(`http://127.0.0.1:5000${endpoint}`, {            
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email, password: password })
        });

        // 2. التحقق من النجاح (200 أو 201)
        if (response.ok) {
            localStorage.setItem('currentUser', JSON.stringify({ email: email }));
            window.location.href = "index.html"; // أو اسم صفحة الـ Dashboard بتاعتك
        
            
            // احتياطي لو المتصفح رفض replace
            setTimeout(() => {
                window.location.href = "index.html";
            }, 100);
            
        } else {
            // 3. معالجة الخطأ لو بايثون رد بكود غير 200
            const errorData = await response.json().catch(() => ({})); 
            alert("⚠️ " + (errorData.message || "بيانات الدخول غير صحيحة"));
            resetUI(isLoginMode ? "دخول" : "تسجيل");
        }
    } catch (error) {
        console.error("Connection Error:", error);
        alert("⚠️ تعذر الوصول للسيرفر، تأكد من تشغيل app.py");
        resetUI(isLoginMode ? "دخول" : "تسجيل");
    }
};

function resetUI(text) {
    const authBtn = document.getElementById('authBtn');
    const btnText = document.getElementById('btnText');
    const loadingSpinner = document.getElementById('loadingSpinner');
    authBtn.disabled = false;
    loadingSpinner.style.display = 'none';
    btnText.innerText = text;
}

    // زر الحساب التجريبي
    document.getElementById('demoUserBtn').onclick = () => {
        document.getElementById('authEmail').value = "demo@smartbi.com";
        document.getElementById('authPassword').value = "123456";
    };
</script>

</body>
</html>
